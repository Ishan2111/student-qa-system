<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Student Q&A System</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .login-card .form-control { background: var(--surface2); }
    .input-group { position: relative; }
    .input-group .form-control { padding-right: 44px; }
    .toggle-password {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: var(--text-muted); font-size: 18px;
      background: none; border: none; padding: 0;
    }
    .wave {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 120px; overflow: hidden;
    }
    .wave svg { position: absolute; bottom: 0; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="wave">
      <svg viewBox="0 0 1440 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="100%" height="120">
        <path d="M0,64L80,58.7C160,53,320,43,480,48C640,53,800,75,960,80C1120,85,1280,75,1360,69.3L1440,64V120H0Z" fill="rgba(255,255,255,0.06)"/>
      </svg>
    </div>

    <div class="login-card">
      <div class="login-logo">🎓</div>
      <h2 style="text-align:center;font-size:22px;margin-bottom:4px">Admin Portal</h2>
      <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:28px">Sign in to manage your Q&A System</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-group">
            <input type="text" id="username" class="form-control" placeholder="admin" autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-password" id="togglePwd">👁</button>
          </div>
        </div>

        <div id="error-msg" style="display:none;background:#fce8e6;color:#c62828;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;border-left:3px solid var(--danger)"></div>

        <button type="submit" class="btn btn-primary w-100 btn-lg" id="loginBtn">
          Sign In
        </button>
      </form>

      <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
        <a href="../student/login.html" style="color:var(--text-muted);font-size:13px">🎒 Student Login</a>
      </div>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn() && Auth.getRole() === 'admin') {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('togglePwd').addEventListener('click', function() {
      const pwd = document.getElementById('password');
      const isHidden = pwd.type === 'password';
      pwd.type = isHidden ? 'text' : 'password';
      this.textContent = isHidden ? '🙈' : '👁';
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('error-msg');

      if (!username || !password) {
        errEl.textContent = 'Please enter username and password.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px"></span> Signing in...';
      errEl.style.display = 'none';

      try {
        const result = await API.adminLogin(username, password);
        Auth.setSession(result.data);
        Toast.success('Welcome back, Administrator!');
        setTimeout(() => window.location.href = 'dashboard.html', 600);
      } catch (err) {
        errEl.textContent = err.message || 'Login failed. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Allow Enter key
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
