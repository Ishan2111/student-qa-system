<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Student</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .profile-banner { background:linear-gradient(135deg,#1a73e8,#0d47a1);border-radius:16px;padding:28px;color:white;display:flex;align-items:center;gap:20px;margin-bottom:24px; }
    .profile-avatar-large { width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;flex-shrink:0;border:3px solid rgba(255,255,255,0.4);color:white; }
    .info-row { display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border); }
    .info-row:last-child { border-bottom:none; }
    .info-label { width:140px;font-size:13px;color:var(--text-muted);font-weight:600;flex-shrink:0; }
    .info-value { flex:1;font-size:14px;color:var(--text);font-weight:500; }
    .section-tabs { display:flex;gap:8px;margin-bottom:20px; }
    .section-tab { padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;color:var(--text); }
    .section-tab.active { background:var(--primary);color:white;border-color:var(--primary); }
    .section-panel { display:none; }
    .section-panel.active { display:block; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="dashboard.html"><div class="brand-icon">🎒</div><div class="brand-text"><h1>Q&A Portal</h1><p>Student View</p></div></a>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Menu</span>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="nav-item" href="question.html"><span class="nav-icon">❓</span> Today's Question</a>
      <a class="nav-item" href="history.html"><span class="nav-icon">📜</span> Answer History</a>
      <a class="nav-item" href="progress.html"><span class="nav-icon">📊</span> My Progress</a>
      <a class="nav-item active" href="profile.html"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="user-avatar" data-user-avatar></div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:white;overflow:hidden;text-overflow:ellipsis" data-user-name></div><div style="font-size:11px;opacity:0.7;color:white" data-user-id></div></div>
        <button onclick="Auth.logout('login.html')" style="background:rgba(255,255,255,0.15);border:none;color:white;border-radius:8px;padding:6px 8px;cursor:pointer;font-size:16px">🚪</button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <button class="topbar-btn" id="sidebar-toggle">☰</button>
      <div class="topbar-title">My Profile</div>
      <div class="topbar-actions" style="margin-left:auto">
        <button class="topbar-btn" id="theme-toggle">🌙</button>
      </div>
    </header>

    <main class="page-content" style="max-width:700px;margin:0 auto">
      <!-- Profile Banner -->
      <div class="profile-banner" id="profile-banner">
        <div class="profile-avatar-large" id="profile-avatar-lg" style="background:rgba(255,255,255,0.2)">?</div>
        <div>
          <div style="font-size:22px;font-weight:800;margin-bottom:4px" id="pb-name">Loading…</div>
          <div style="opacity:0.8;font-size:14px" id="pb-id"></div>
          <div style="opacity:0.8;font-size:13px;margin-top:2px" id="pb-class"></div>
          <div style="margin-top:10px">
            <span id="pb-status" style="background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:20px;font-size:12px">—</span>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="section-tabs">
        <button class="section-tab active" onclick="switchTab('info', this)">👤 Information</button>
        <button class="section-tab" onclick="switchTab('edit', this)">✏ Edit Profile</button>
        <button class="section-tab" onclick="switchTab('password', this)">🔑 Change Password</button>
      </div>

      <!-- Info Panel -->
      <div class="section-panel active" id="panel-info">
        <div class="card">
          <div class="card-header"><div class="card-title">Student Information</div></div>
          <div class="card-body" id="info-rows">
            <div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>
          </div>
        </div>
      </div>

      <!-- Edit Panel -->
      <div class="section-panel" id="panel-edit">
        <div class="card">
          <div class="card-header"><div class="card-title">✏ Edit Profile</div></div>
          <div class="card-body">
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">You can update your name, mobile, and remarks. Contact your admin to change other details.</p>
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="e-name" placeholder="Full Name">
            </div>
            <div class="form-group">
              <label class="form-label">Mobile</label>
              <input type="tel" class="form-control" id="e-mobile" placeholder="Mobile Number">
            </div>
            <div class="form-group">
              <label class="form-label">Parent Name</label>
              <input type="text" class="form-control" id="e-parent" placeholder="Parent / Guardian Name">
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">Update Profile</button>
          </div>
        </div>
      </div>

      <!-- Password Panel -->
      <div class="section-panel" id="panel-password">
        <div class="card">
          <div class="card-header"><div class="card-title">🔑 Change Password</div></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <input type="password" class="form-control" id="p-current" placeholder="Enter current password">
            </div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" id="p-new" placeholder="At least 6 characters">
            </div>
            <div class="form-group">
              <label class="form-label">Confirm New Password</label>
              <input type="password" class="form-control" id="p-confirm" placeholder="Confirm new password">
            </div>
            <div id="pwd-strength" style="margin-bottom:12px;font-size:13px;color:var(--text-muted)"></div>
            <button class="btn btn-primary" onclick="changePassword()">Change Password</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script>
if (!Auth.requireStudent()) throw new Error('Unauthorized');
populateUserInfo();
setupThemeToggle();
Utils.setupSidebar();

const session = Auth.getSession();
let studentData = null;

function switchTab(tab, btn) {
  document.querySelectorAll('.section-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.section-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
}

// Password strength indicator
document.getElementById('p-new').addEventListener('input', function() {
  const pwd = this.value;
  const el = document.getElementById('pwd-strength');
  if (!pwd) { el.textContent = ''; return; }
  let strength = 0;
  if (pwd.length >= 6) strength++;
  if (pwd.length >= 8) strength++;
  if (/[A-Z]/.test(pwd)) strength++;
  if (/[0-9]/.test(pwd)) strength++;
  if (/[^A-Za-z0-9]/.test(pwd)) strength++;
  const labels = ['', '😟 Very Weak', '😐 Weak', '🙂 Fair', '😊 Strong', '💪 Very Strong'];
  const colors = ['', 'var(--danger)', 'var(--danger)', '#f57f17', 'var(--secondary)', 'var(--secondary)'];
  el.textContent = labels[strength] || '';
  el.style.color = colors[strength] || '';
});

async function loadProfile() {
  try {
    const data = await API.getStudent(session.studentId);
    studentData = data;

    // Banner
    const initials = Utils.initials(data['Full Name']);
    const bg = Utils.avatarColor(data['Full Name']);
    document.getElementById('profile-avatar-lg').textContent = initials;
    document.getElementById('profile-avatar-lg').style.background = bg;
    document.getElementById('pb-name').textContent = data['Full Name'] || '—';
    document.getElementById('pb-id').textContent = data['Student ID'] || '';
    document.getElementById('pb-class').textContent = `Class ${data['Class'] || '—'} - ${data['Section'] || '—'} | Roll: ${data['Roll Number'] || '—'}`;
    document.getElementById('pb-status').textContent = data['Status'] || '—';

    // Info rows
    const fields = [
      ['Student ID', data['Student ID']],
      ['Full Name', data['Full Name']],
      ['Class', `Class ${data['Class']} - Section ${data['Section']}`],
      ['Roll Number', data['Roll Number']],
      ['Gender', data['Gender']],
      ['Date of Birth', Utils.formatDate(data['Date of Birth'])],
      ['Parent Name', data['Parent Name']],
      ['Mobile', data['Mobile']],
      ['Email', data['Email']],
      ['Admission Date', Utils.formatDate(data['Admission Date'])],
      ['Last Login', Utils.formatDateTime(data['Last Login'])],
      ['Status', data['Status']],
      ['Remarks', data['Remarks']]
    ];

    document.getElementById('info-rows').innerHTML = fields.map(([label, val]) => `
      <div class="info-row">
        <div class="info-label">${label}</div>
        <div class="info-value">${label === 'Status' ? Utils.statusBadge(val) : Utils.escapeHtml(val || '—')}</div>
      </div>`).join('');

    // Pre-fill edit form
    document.getElementById('e-name').value = data['Full Name'] || '';
    document.getElementById('e-mobile').value = data['Mobile'] || '';
    document.getElementById('e-parent').value = data['Parent Name'] || '';
  } catch (err) {
    document.getElementById('info-rows').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>${err.message}</p></div>`;
  }
}

async function saveProfile() {
  const name = document.getElementById('e-name').value.trim();
  if (!name) { Toast.error('Name cannot be empty'); return; }

  try {
    await API.updateProfile(session.studentId, {
      'Full Name': name,
      'Mobile': document.getElementById('e-mobile').value,
      'Parent Name': document.getElementById('e-parent').value
    });

    // Update session
    const sess = Auth.getSession();
    sess.name = name;
    Auth.setSession(sess);

    Toast.success('Profile updated!');
    loadProfile();

    // Refresh user info in UI
    populateUserInfo();
  } catch (err) {
    Toast.error(err.message);
  }
}

async function changePassword() {
  const current = document.getElementById('p-current').value;
  const newPwd = document.getElementById('p-new').value;
  const confirm = document.getElementById('p-confirm').value;

  if (!current || !newPwd || !confirm) { Toast.error('All fields required'); return; }
  if (newPwd.length < 6) { Toast.error('New password must be at least 6 characters'); return; }
  if (newPwd !== confirm) { Toast.error('New passwords do not match'); return; }

  try {
    await API.changePassword(session.studentId, current, newPwd);
    Toast.success('Password changed! Please log in again.');
    document.getElementById('p-current').value = '';
    document.getElementById('p-new').value = '';
    document.getElementById('p-confirm').value = '';
    setTimeout(() => Auth.logout('login.html'), 2000);
  } catch (err) {
    Toast.error(err.message);
  }
}

loadProfile();
</script>
</body>
</html>
